name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/hugo.toml"
      - "docs-site/content/**"
      - "docs-site/layouts/**"
      - "docs-site/assets/**"
      - "docs-site/static/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Deploy still requires Pages enabled once: Settings → Pages → Build: GitHub Actions.
# We do not use actions/configure-pages here: its API returns 404 until Pages exists,
# which blocks the first build; baseURL is set in docs-site/hugo.toml instead.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    env:
      HUGO_VERSION: 0.140.2
    steps:
      - uses: actions/checkout@v6
      - name: Install Hugo
        run: |
          curl -sSL -o hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb
      - name: Build
        run: hugo --minify
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
