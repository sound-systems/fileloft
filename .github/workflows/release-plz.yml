# Publishes workspace crates to crates.io using release-plz (semantic versioning via Conventional Commits).
#
# Repository setup (one-time):
# - Settings → Actions → General → Workflow permissions: Read and write, and allow creating PRs.
# - Repository secret: CARGO_REGISTRY_TOKEN (crates.io token with publish-new + publish-update).
#   https://release-plz.dev/docs/github/quickstart
# - Optional: restrict the `if:` below to your org/repo if you fork.

name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: github.repository == 'sound-systems/fileloft'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Open release PR (versions + changelog)
    runs-on: ubuntu-latest
    if: github.repository == 'sound-systems/fileloft'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
